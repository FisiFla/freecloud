name: E2E

on:
  workflow_dispatch:
  schedule:
    # Nightly at 02:00 UTC
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  # A2 (FCEX3-6): Build the Keycloak SPI JAR separately first so CI can cache
  # the Maven build layer independently of the Docker image build.
  build-kc-spi:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Keycloak SPI JAR + run Java unit tests
        run: |
          cd keycloak-authenticator
          mvn -q package
        # mvn package = compile + test + shade. Fails the job if Java unit tests fail.

      - name: Verify JAR exists
        run: |
          ls -lh keycloak-authenticator/target/keycloak-posture-authenticator-1.0.0.jar

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run e2e if the SPI jar builds cleanly.
    needs: build-kc-spi

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Generate A2 GeoIP e2e fixture
        # A tiny, non-MaxMind-licensed mmdb (NOT a real GeoLite2 database) so
        # the geo-condition enforcement e2e test has a live GeoIP lookup to
        # exercise. Real deployments supply their own operator-downloaded
        # GeoLite2 file — see docs/DEPLOYMENT.md "GeoIP (MaxMind GeoLite2)".
        run: |
          mkdir -p backend/.e2e-fixtures
          cd backend && go run ./cmd/genfixturemmdb -out .e2e-fixtures/geoip-fixture.mmdb

      - name: Build e2e stack
        # docker/Dockerfile.keycloak is a multi-stage build: maven stage builds the jar,
        # second stage bakes it into the Keycloak image.  No Java/Maven needed here
        # because the build happens inside Docker.
        run: |
          docker compose -f docker/docker-compose.e2e.yml build

      - name: Start e2e stack
        run: |
          docker compose -f docker/docker-compose.e2e.yml up -d

      - name: Wait for backend to be ready
        # Backend self-bootstraps Keycloak on startup (Epic A). Allow extra time
        # for the first-run provisioning to complete.
        run: |
          echo "Waiting for backend at http://localhost:8085/healthz..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8085/healthz >/dev/null 2>&1; then
              echo "Backend ready."
              break
            fi
            echo "  attempt $i/60..."
            sleep 5
          done
          curl -sf http://localhost:8085/healthz || (echo "Backend not ready after 300s." && exit 1)

      - name: Run e2e tests
        env:
          E2E_BACKEND_URL: http://localhost:8085
          E2E_SCIM_TOKEN: e2e-scim-token
          E2E_WEBHOOK_SECRET: e2e-webhook-secret
          # A4 (FCEX3-8): access eval token for posture enforcement e2e tests.
          E2E_ACCESS_EVAL_TOKEN: e2e-access-eval-token
          # F2: LDAP URL exposed for reference (tests use the compose service name internally).
          E2E_LDAP_URL: ldap://localhost:1389
          # A1: admin-JWT path — Keycloak is reachable at localhost:8083 from the
          # runner; credentials match E2E_SEED_ADMIN in docker-compose.e2e.yml.
          E2E_KEYCLOAK_URL: http://localhost:8083
          E2E_KEYCLOAK_REALM: freecloud-e2e
          E2E_ADMIN_USERNAME: e2e-admin
          E2E_ADMIN_PASSWORD: e2e-admin-password
          E2E_DASHBOARD_CLIENT_ID: freecloud-dashboard
          # A3: reverse proxy in front of Keycloak for the client-IP-forwarding
          # test. Port 8089 — 8086/8087 are reserved for the B4 HA overlay's
          # lb-e2e / backend-e2e-2 in the e2e-ha job below.
          E2E_KEYCLOAK_PROXY_URL: http://localhost:8089
          # A1: downstream SCIM mock target for the provisioning round-trip test.
          E2E_SCIM_MOCK_TOKEN: e2e-scim-mock-token
        run: |
          cd backend && go test -tags=e2e -v -timeout 5m ./internal/e2e/...

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose -f docker/docker-compose.e2e.yml logs --tail=100

      - name: Tear down stack
        if: always()
        run: |
          docker compose -f docker/docker-compose.e2e.yml down -v

  # B4 (v1.7 HA): multi-instance proof. Runs the same base e2e stack PLUS the
  # docker-compose.e2e-ha.yml overlay (second backend replica + LB), proving
  # migrations-once / shared-rate-limit / single-leader / bootstrap-once
  # across two replicas. Kept as a separate job (not folded into `e2e` above)
  # so the single-replica path's runtime/flakiness is unaffected; dispatched
  # the same way (workflow_dispatch + nightly schedule), not on PRs.
  e2e-ha:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-kc-spi

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Build HA e2e stack
        run: |
          docker compose -f docker/docker-compose.e2e.yml -f docker/docker-compose.e2e-ha.yml build

      - name: Start HA e2e stack
        run: |
          docker compose -f docker/docker-compose.e2e.yml -f docker/docker-compose.e2e-ha.yml up -d

      - name: Wait for both replicas to be ready
        run: |
          for url in http://localhost:8085 http://localhost:8087; do
            echo "Waiting for $url/readyz..."
            for i in $(seq 1 60); do
              if curl -sf "$url/readyz" >/dev/null 2>&1; then
                echo "  $url ready."
                break
              fi
              echo "  attempt $i/60..."
              sleep 5
            done
            curl -sf "$url/readyz" || (echo "$url not ready after 300s." && exit 1)
          done

      - name: Run HA e2e tests
        env:
          E2E_HA_LB_URL: http://localhost:8086
          E2E_HA_REPLICA_A_URL: http://localhost:8085
          E2E_HA_REPLICA_B_URL: http://localhost:8087
        run: |
          cd backend && go test -tags=e2e -v -timeout 5m -run TestHA ./internal/e2e/...

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose -f docker/docker-compose.e2e.yml -f docker/docker-compose.e2e-ha.yml logs --tail=150

      - name: Tear down HA stack
        if: always()
        run: |
          docker compose -f docker/docker-compose.e2e.yml -f docker/docker-compose.e2e-ha.yml down -v

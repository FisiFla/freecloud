name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Fast gate (vet + unit tests + frontend typecheck/build)
        run: make verify
      - name: Keycloak SPI tests
        run: cd keycloak-authenticator && mvn test
      - name: Race detector
        run: cd backend && go test -race ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          cd backend && "$(go env GOPATH)/bin/staticcheck" ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd backend && "$(go env GOPATH)/bin/govulncheck" ./...
      - name: npm audit
        run: cd frontend && npm audit --audit-level=high

  db-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: freecloud
          POSTGRES_PASSWORD: freecloud
          POSTGRES_DB: freecloud_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U freecloud"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum
      - name: DB-backed integration tests
        env:
          TEST_DATABASE_URL: postgres://freecloud:freecloud@localhost:5432/freecloud_test?sslmode=disable
        run: make test-db

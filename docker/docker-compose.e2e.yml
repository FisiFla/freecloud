## E2E test stack — ephemeral. Bring up with:
##   docker compose -f docker/docker-compose.e2e.yml up -d --build
##   cd backend && go test -tags=e2e -v ./internal/e2e/...
##   docker compose -f docker/docker-compose.e2e.yml down -v

services:
  postgres-e2e:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freecloud
      POSTGRES_PASSWORD: freecloud
      POSTGRES_DB: freecloud_e2e
    volumes:
      - ./postgres/init-keycloak-e2e-db.sql:/docker-entrypoint-initdb.d/init-keycloak-e2e-db.sql:ro
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freecloud -d freecloud_e2e"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak-e2e:
    # A2 (FCEX3-6): custom Keycloak image with the posture-check SPI jar baked in.
    # Build context is the repo root so the maven module keycloak-authenticator/
    # is accessible during the multi-stage Docker build.
    build:
      context: ..
      dockerfile: docker/Dockerfile.keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-e2e:5432/keycloak_e2e
      KC_DB_DATABASE: keycloak_e2e
      KC_DB_USERNAME: freecloud
      KC_DB_PASSWORD: freecloud
      # KC_HOSTNAME must match what the backend uses to validate JWT issuers
      # (KEYCLOAK_URL below in backend-e2e: http://keycloak-e2e:8080) —
      # Keycloak stamps this into every token's "iss" claim regardless of
      # which address a caller actually used to reach it. A full URL (not
      # just a bare hostname) pins the scheme+host+port that Keycloak's
      # hostname-v2 provider stamps into "iss", overriding what it would
      # otherwise infer per-request from the Host header/port — needed so the
      # issuer stays consistent whether a caller reaches Keycloak via the
      # direct port mapping (8083) or via keycloak-proxy-e2e (8089). start-dev
      # disables hostname strict-checking, so this does not block requests
      # that arrive via a different address/port than what's advertised.
      KC_HOSTNAME: http://keycloak-e2e:8080
      # A3: propagate posture-check config so the SPI can call the backend.
      # In e2e the backend is reachable at its internal compose hostname.
      ACCESS_EVAL_URL: http://backend-e2e:8080/api/v1/access/evaluate
      ACCESS_EVAL_TOKEN: e2e-access-eval-token
      # Feature flag: enable enforcement in e2e (A4 tests verify the SPI fires).
      POSTURE_CHECK_ENABLED: "true"
      # A3: trust X-Forwarded-For — ONLY safe because keycloak-proxy-e2e below
      # is the sole intended path in the network-condition e2e test. Port 8083
      # (this container, exposed directly) stays reachable too because other
      # e2e helpers (admin_auth_test.go's ROPC token exchange) use it and don't
      # go through a proxy — those flows don't hit the posture-check SPI at
      # all (direct grant bypasses the browser flow), so TRUST_PROXY here has
      # no effect on them. See docs/DEPLOYMENT.md "Reverse Proxy Requirements
      # (SPI Client-IP Forwarding)" for why direct access must be network-
      # blocked in a real deployment.
      TRUST_PROXY: "true"
    ports:
      - "8083:8080"
    depends_on:
      postgres-e2e:
        condition: service_healthy
    command: start-dev
    # No healthcheck: the Keycloak image ships without curl and KC's health
    # endpoint needs KC_HEALTH_ENABLED on the management port. Readiness is
    # handled by the backend, which retries the admin login until Keycloak is up.

  # B1 (v1.7 HA): dedicated Redis for the backend rate limiter in e2e.
  redis-e2e:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # B2 (v1.7 HA): one-shot migration job. backend-e2e (and, in the HA overlay,
  # backend-e2e-2) both depend on this completing first — proves migrations
  # run exactly once even with multiple replicas (see B4 e2e tests).
  migrate-e2e:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["migrate"]
    environment:
      DATABASE_URL: postgres://freecloud:freecloud@postgres-e2e:5432/freecloud_e2e?sslmode=disable
    depends_on:
      postgres-e2e:
        condition: service_healthy

  # A3: reverse proxy in front of Keycloak for the client-IP-forwarding e2e
  # test. Caddy's reverse_proxy appends the real connecting peer's address to
  # X-Forwarded-For (never replaces an existing value), which is exactly the
  # "trust only the rightmost hop" contract ClientIPResolver implements.
  keycloak-proxy-e2e:
    image: caddy:2-alpine
    ports:
      # NOT 8086/8087 — those are claimed by the B4 HA overlay's lb-e2e and
      # backend-e2e-2 (docker-compose.e2e-ha.yml), which layers on top of
      # this base file. Keep this and scim-mock-e2e's ports out of that range.
      - "8089:8080"
    volumes:
      - ./keycloak-proxy-e2e/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - keycloak-e2e

  fleetdm-e2e:
    build:
      context: ./fleetdm-mock
      dockerfile: Dockerfile
    ports:
      - "8084:8080"
    environment:
      BACKEND_URL: http://backend-e2e:8080
      FLEET_WEBHOOK_SECRET: e2e-webhook-secret
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # A1: minimal SCIM mock standing in for a downstream SaaS tenant, used only
  # by TestE2E_Admin_ProvisioningRoundTrip. Self-looping outbound provisioning
  # back into this backend's own inbound SCIM doesn't work (the employee
  # already exists there by email -> 409), so the round-trip needs a
  # genuinely separate target — this is not a contract-fidelity mock (see A4's
  # httptest-based Slack/GitHub tests for that).
  scim-mock-e2e:
    build:
      context: ./scim-mock-e2e
      dockerfile: Dockerfile
    ports:
      # See keycloak-proxy-e2e's port comment — kept clear of the B4 HA
      # overlay's 8086/8087.
      - "8088:8080"
    environment:
      SCIM_MOCK_TOKEN: e2e-scim-mock-token
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # F2: OpenLDAP container for LDAP/AD federation e2e tests.
  openldap-e2e:
    # Bitnami relocated free images to the bitnamilegacy namespace (Aug 2025);
    # bitnami/openldap:latest now 404s with "manifest unknown".
    image: bitnamilegacy/openldap:latest
    ports:
      - "1389:1389"
    environment:
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: adminpassword
      LDAP_ROOT: dc=example,dc=com
      LDAP_ADMIN_DN: cn=admin,dc=example,dc=com
      # A1: seed two plain users so the federation-sync e2e test can prove a
      # real sync pulls real entries into Keycloak (not just "the call succeeds").
      LDAP_CUSTOM_LDIF_DIR: /ldifs
    volumes:
      - ./openldap-e2e/seed.ldif:/ldifs/seed.ldif:ro
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost:1389 -D 'cn=admin,dc=example,dc=com' -w adminpassword -b 'dc=example,dc=com' -s base >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  backend-e2e:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8085:8080"
    environment:
      DATABASE_URL: postgres://freecloud:freecloud@postgres-e2e:5432/freecloud_e2e?sslmode=disable
      APP_ENV: test
      PORT: "8080"
      # B1: e2e's dedicated Redis (not shared with the localhost/prod ones).
      REDIS_URL: redis://redis-e2e:6379/0
      KEYCLOAK_URL: http://keycloak-e2e:8080
      KEYCLOAK_REALM: freecloud-e2e
      KEYCLOAK_CLIENT_ID: freecloud-service
      # KEYCLOAK_CLIENT_SECRET pins the secret so e2e tests can authenticate
      # as the service account with a known value. The bootstrap engine sees
      # this and sets the same secret when provisioning freecloud-service.
      KEYCLOAK_CLIENT_SECRET: freecloud-secret
      # Bootstrap credentials — master-admin used on startup to self-provision Keycloak.
      KC_BOOTSTRAP_ADMIN: admin
      KC_BOOTSTRAP_PASSWORD: admin
      FLEET_URL: http://fleetdm-e2e:8080
      FLEET_API_TOKEN: e2e-fleet-token
      FLEET_WEBHOOK_SECRET: e2e-webhook-secret
      SCIM_BEARER_TOKEN: e2e-scim-token
      ACCESS_EVAL_TOKEN: e2e-access-eval-token
      # A1: seed a known admin user + enable direct-access-grant on the
      # dashboard client so the e2e harness can mint a real admin JWT from
      # Keycloak's token endpoint. Fail-closed at the app layer: only honoured
      # because APP_ENV=test above (config.IsDevOrE2E) — this flag alone does
      # nothing outside dev/e2e.
      E2E_SEED_ADMIN: "true"
      E2E_ADMIN_USERNAME: e2e-admin
      E2E_ADMIN_PASSWORD: e2e-admin-password
      CORS_ORIGIN: http://localhost:3000
      # F2: LDAP bind password for federation source creation.
      LDAP_BIND_PASSWORD: adminpassword
      # A2: live GeoIP for the geo-condition enforcement e2e test. This is a
      # tiny, non-MaxMind-licensed fixture generated by
      # `go run ./cmd/genfixturemmdb` before `docker compose up` (see
      # .github/workflows/e2e.yml) — NOT a real GeoLite2 database. Real
      # deployments point this at an operator-downloaded GeoLite2 file; see
      # docs/DEPLOYMENT.md "GeoIP (MaxMind GeoLite2)".
      GEOIP_MMDB_PATH: /geoip/fixture.mmdb
    volumes:
      - ../backend/.e2e-fixtures/geoip-fixture.mmdb:/geoip/fixture.mmdb:ro
    depends_on:
      postgres-e2e:
        condition: service_healthy
      redis-e2e:
        condition: service_healthy
      migrate-e2e:
        condition: service_completed_successfully
      keycloak-e2e:
        condition: service_started
      fleetdm-e2e:
        condition: service_healthy
      openldap-e2e:
        condition: service_healthy
      scim-mock-e2e:
        condition: service_healthy
    # No healthcheck: the backend image is distroless (no shell, no wget —
    # see backend/Dockerfile), so a CMD-SHELL check can never succeed here.
    # Readiness is polled externally (CI curls /readyz) instead of gated via
    # depends_on: condition: service_healthy.

volumes: {}

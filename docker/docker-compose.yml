services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freecloud
      POSTGRES_PASSWORD: freecloud
      POSTGRES_DB: freecloud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freecloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_DATABASE: keycloak
      KC_DB_USERNAME: freecloud
      KC_DB_PASSWORD: freecloud
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8081
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: start-dev

  # FleetDM mock — this is a PLACEHOLDER implementation using an echo server.
  # It returns whatever request body it receives, NOT real FleetDM API shapes.
  # In production, replace this service with a real FleetDM instance (https://fleetdm.com).
  # The FleetClient in Go gracefully degrades: if the FleetDM API is unreachable or
  # returns errors, GetHosts/GetHostSoftware/GetHostSecurityState return sensible
  # zero/mock data so the app still works during development.
  fleetdm-mock:
    image: mendhak/http-https-echo:latest
    ports:
      - "8082:8080"
    environment:
      HTTP_PORT: 8080

volumes:
  pgdata:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freecloud
      POSTGRES_PASSWORD: freecloud
      POSTGRES_DB: freecloud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-keycloak-db.sql:/docker-entrypoint-initdb.d/init-keycloak-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freecloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    # A2: custom Keycloak image with the posture-check SPI jar.
    # Run `make kc-build` (or `docker compose build keycloak`) to rebuild the image
    # after changes to keycloak-authenticator/. The plain stock image is used if
    # POSTURE_CHECK_ENABLED is absent/false, so dev can skip the slow Maven build.
    build:
      context: ..
      dockerfile: docker/Dockerfile.keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_DATABASE: keycloak
      KC_DB_USERNAME: freecloud
      KC_DB_PASSWORD: freecloud
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8081
      ACCESS_EVAL_URL: http://host.docker.internal:8080/api/v1/access/evaluate
      ACCESS_EVAL_TOKEN: ""
      POSTURE_CHECK_ENABLED: "false"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command: start-dev

  fleetdm-mock:
    build:
      context: ./fleetdm-mock
      dockerfile: Dockerfile
    ports:
      - "8082:8080"

volumes:
  pgdata:

# Production stack for FreeCloud. Bring up with:
#   cp .env.prod.example .env.prod && edit it, then:
#   docker compose -f docker/docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Caddy terminates TLS for all three public hostnames and reverse-proxies them
# to the internal services. Postgres runs with TLS so the backend connects with
# sslmode=require. There is NO fleetdm-mock here — point FLEET_URL at a real
# FleetDM. Run this on the dev MacBook's Docker for testing, not the NAS.

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-keycloak-db.sql:/docker-entrypoint-initdb.d/init-keycloak-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    restart: unless-stopped
    command: ["start"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: ${KC_PUBLIC_URL}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: production
      PORT: "8080"
      # TLS to Postgres on the internal network (the custom postgres image serves TLS).
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=require
      # Public Keycloak URL so the JWT issuer matches and JWKS is fetched through Caddy.
      KEYCLOAK_URL: ${KC_PUBLIC_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE}
      FLEET_URL: ${FLEET_URL}
      FLEET_API_TOKEN: ${FLEET_API_TOKEN}
      FLEET_WEBHOOK_SECRET: ${FLEET_WEBHOOK_SECRET}
      CORS_ORIGIN: ${DASHBOARD_PUBLIC_URL}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AUTH_URL: ${DASHBOARD_PUBLIC_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_KEYCLOAK_ID: ${AUTH_KEYCLOAK_ID}
      AUTH_KEYCLOAK_SECRET: ${AUTH_KEYCLOAK_SECRET}
      AUTH_KEYCLOAK_ISSUER: ${KC_PUBLIC_URL}/realms/${KEYCLOAK_REALM}
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      KC_DOMAIN: ${KC_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - keycloak

volumes:
  pgdata:
  caddy_data:
  caddy_config:

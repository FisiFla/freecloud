global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: freecloud-backend
    # The backend exposes /metrics on the same port as the API.
    # In production this is on the internal network (not the public Caddy port).
    static_configs:
      - targets: ["backend:8080"]
    metrics_path: /metrics

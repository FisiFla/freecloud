groups:
  - name: freecloud.backend
    rules:

      # ── Availability ───────────────────────────────────────────────────────

      - alert: BackendDown
        expr: absent(up{job="freecloud-backend"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "FreeCloud backend is unreachable"
          description: >
            Prometheus has not received a scrape from the freecloud-backend
            job for more than 1 minute. The process may have crashed or the
            network path is broken.

      - alert: ReadyzDown
        expr: probe_success{job="freecloud-backend", instance="/readyz"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "FreeCloud readiness probe is failing"
          description: >
            /readyz has returned a non-2xx for 2 minutes — the database or
            Keycloak is unreachable. Check backend logs and dependency health.

      # ── Error rate ─────────────────────────────────────────────────────────

      - alert: HighErrorRate
        expr: >
          (
            sum(rate(http_requests_total{job="freecloud-backend",status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="freecloud-backend"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "FreeCloud 5xx error rate above 5%"
          description: >
            More than 5% of HTTP requests are returning 5xx over the last
            5 minutes. Check backend logs for root cause.

      - alert: CriticalErrorRate
        expr: >
          (
            sum(rate(http_requests_total{job="freecloud-backend",status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="freecloud-backend"}[5m]))
          ) > 0.25
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "FreeCloud 5xx error rate above 25% — service degraded"
          description: >
            More than 25% of HTTP requests are returning 5xx. The service is
            largely broken; escalate immediately.

      # ── Latency ───────────────────────────────────────────────────────────

      - alert: HighP99Latency
        expr: >
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket{job="freecloud-backend"}[5m]))
            by (le, route)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "FreeCloud P99 latency above 2s on {{ $labels.route }}"
          description: >
            The 99th-percentile response time for {{ $labels.route }} is above
            2 seconds over the last 5 minutes.

      # ── Reconciliation drift ───────────────────────────────────────────────

      - alert: ReconciliationDriftKeycloak
        expr: freecloud_reconcile_orphans_in_keycloak > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "{{ $value }} Keycloak users have no local DB record"
          description: >
            The reconciliation job found {{ $value }} user(s) present in
            Keycloak but absent from the FreeCloud database for at least
            30 minutes. Check GET /api/v1/admin/drift for IDs.

      - alert: ReconciliationDriftDB
        expr: freecloud_reconcile_orphans_in_db > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "{{ $value }} DB users have no Keycloak record"
          description: >
            The reconciliation job found {{ $value }} user(s) present in the
            FreeCloud database but absent from Keycloak for at least
            30 minutes. These accounts cannot authenticate.

      - alert: ReconciliationJobStale
        expr: >
          (time() - freecloud_reconcile_last_run_timestamp_seconds) > 3600
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Reconciliation job has not run in over 1 hour"
          description: >
            The last successful reconciliation run was more than 1 hour ago.
            The job may be stuck or disabled unexpectedly.
